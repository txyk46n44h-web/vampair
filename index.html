<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampair</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    overflow-x:hidden;
}

/* GLOW CURSORE */
.cursor-glow {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,0,100,0.2) 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* GLITCH */
.glitch {
    animation: glitch 1s infinite;
}
@keyframes glitch {
    0% { text-shadow:2px 0 red; }
    50% { text-shadow:-2px 0 blue; }
    100% { text-shadow:2px 0 red; }
}

/* BUTTON */
.btn {
    padding:10px 20px;
    border:1px solid #ff0066;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover {
    background:#ff0066;
}

/* ADMIN */
.admin-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    width:50px;
    height:50px;
    border-radius:50%;
    background:#111;
    border:1px solid #ff0066;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="cursor-glow"></div>

<div style="text-align:center; margin-top:100px;">
    <img id="logo" src="https://via.placeholder.com/120" width="120" style="border-radius:50%">
    <h1 id="title" class="glitch">Vampair</h1>
    <p id="desc">Developer oscuro</p>
</div>

<div style="text-align:center; margin-top:40px;">
    <button class="btn">Progetti</button>
</div>

<button class="admin-btn">⚙️</button>

<script>
/* =========================
   CURSORE GLOW
========================= */
const glow = document.querySelector(".cursor-glow");
document.addEventListener("mousemove", e=>{
    glow.style.left = e.clientX+"px";
    glow.style.top = e.clientY+"px";
});

/* =========================
   PARTICLES
========================= */
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.style.position="fixed";
    p.style.width="2px";
    p.style.height="2px";
    p.style.background="white";
    p.style.left=Math.random()*100+"%";
    p.style.top=Math.random()*100+"%";
    p.style.opacity=Math.random();
    p.style.animation=`float ${5+Math.random()*5}s infinite`;
    document.body.appendChild(p);
}

const style=document.createElement("style");
style.innerHTML=`
@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}`;
document.head.appendChild(style);

/* =========================
   ADMIN PANEL
========================= */

const PASSWORD="1234"; // CAMBIALA

document.querySelector(".admin-btn").onclick=()=>{
    let p=prompt("Password:");
    if(p===PASSWORD) openAdmin();
    else alert("no");
};

function openAdmin(){
    let panel=document.createElement("div");
    panel.innerHTML=`
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000000ee;padding:20px;z-index:9999;">
        <h2>ADMIN</h2>

        <input id="t" placeholder="Titolo"><br><br>
        <input id="d" placeholder="Descrizione"><br><br>
        <input id="l" placeholder="Logo URL"><br><br>

        <button onclick="save()">SALVA</button>
        <button onclick="this.parentElement.remove()">CHIUDI</button>
    </div>`;
    document.body.appendChild(panel);
}

function save(){
    let t=document.getElementById("t").value;
    let d=document.getElementById("d").value;
    let l=document.getElementById("l").value;

    if(t){
        document.getElementById("title").innerText=t;
        localStorage.setItem("title",t);
    }

    if(d){
        document.getElementById("desc").innerText=d;
        localStorage.setItem("desc",d);
    }

    if(l){
        document.getElementById("logo").src=l;
        localStorage.setItem("logo",l);
    }

    alert("salvato");
}

/* =========================
   LOAD DATI SALVATI
========================= */
window.onload=()=>{
    if(localStorage.getItem("title"))
        document.getElementById("title").innerText=localStorage.getItem("title");

    if(localStorage.getItem("desc"))
        document.getElementById("desc").innerText=localStorage.getItem("desc");

    if(localStorage.getItem("logo"))
        document.getElementById("logo").src=localStorage.getItem("logo");
};
</script>

</body>
</html>
