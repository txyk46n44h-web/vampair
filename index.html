<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vampair</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: #ff2a2a;
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    .grid {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }

    .terminal {
      border: 1px solid rgba(255,0,0,0.2);
      padding: 30px;
      border-radius: 10px;
      background: rgba(0,0,0,0.6);
      box-shadow: 0 0 20px rgba(255,0,0,0.1);
    }

    .line {
      margin-bottom: 10px;
      white-space: pre;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #ff2a2a;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .section {
      margin-top: 50px;
    }

    .cmd {
      display: block;
      padding: 15px;
      border: 1px solid rgba(255,0,0,0.2);
      margin-bottom: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .cmd:hover {
      background: rgba(255,0,0,0.1);
      transform: translateX(5px);
    }

    .projects {
      margin-top: 20px;
    }

    .project {
      border-left: 2px solid #ff2a2a;
      padding: 10px 15px;
      margin-bottom: 15px;
      opacity: 0.8;
      transition: 0.2s;
    }

    .project:hover {
      opacity: 1;
      transform: translateX(5px);
    }

    footer {
      margin-top: 80px;
      text-align: center;
      opacity: 0.4;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="grid"></div>

<div class="container">

  <div class="terminal" id="terminal">
    <div class="line" id="typing"></div>
    <span class="cursor"></span>
  </div>

  <div class="section">
    <div class="cmd">> open github</div>
    <div class="cmd">> join discord</div>
    <div class="cmd">> contact</div>
  </div>

  <div class="section projects">
    <div class="project">
      [01] neural_interface<br>
      status: active<br>
      type: experimental system
    </div>

    <div class="project">
      [02] shadow_net<br>
      status: running<br>
      type: private network
    </div>

    <div class="project">
      [03] ghost_protocol<br>
      status: unstable<br>
      type: stealth framework
    </div>
  </div>

  <footer id="adminTrigger">
    tap x5
  </footer>

</div>

<script>
  const text = [
    "> system initialized",
    "> identity: vampair",
    "> status: online",
    "> access: granted"
  ];

  let line = 0;
  let char = 0;
  const speed = 40;

  function type() {
    if (line < text.length) {
      if (char < text[line].length) {
        document.getElementById("typing").innerHTML += text[line].charAt(char);
        char++;
        setTimeout(type, speed);
      } else {
        document.getElementById("typing").innerHTML += "\n";
        line++;
        char = 0;
        setTimeout(type, 300);
      }
    }
  }

  type();

  // admin trigger
  let taps = 0;
  document.getElementById("adminTrigger").addEventListener("click", () => {
    taps++;
    if (taps === 5) {
      alert("Admin panel (existing system)");
      taps = 0;
    }
    setTimeout(() => taps = 0, 2000);
  });
</script>

</body>
</html>
